<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 美妆管理系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/custom.css" />
  <style>
    :root {
      --color-primary:        #C4845A;
      --color-primary-light:  #D9A882;
      --color-primary-dark:   #A8694A;
      --color-primary-muted:  #F0D5C5;
      --color-accent:         #E8C9A8;
      --color-gold:           #BFA080;
      --color-bg-base:        #FDFAF8;
      --color-bg-warm:        #F5EDE8;
      --color-bg-section:     #FAF6F3;
      --color-bg-overlay:     rgba(196,132,90,0.06);
      --color-text-primary:   #2C2320;
      --color-text-secondary: #6B5E58;
      --color-text-muted:     #A89690;
      --color-text-on-primary:#FDFAF8;
      --color-text-link:      #C4845A;
      --color-border-light:   #EDE3DC;
      --color-border-medium:  #D9CBBE;
      --color-border-focus:   #C4845A;
      --color-success:        #7BAF8A;
      --color-success-bg:     #EEF5F0;
      --color-warning:        #C9935A;
      --color-warning-bg:     #FBF2EA;
      --color-danger:         #B86A6A;
      --color-danger-bg:      #F7EDED;
      --color-info:           #7A9BB5;
      --color-info-bg:        #EEF3F8;
      --shadow-xs:  0 1px 2px rgba(44,35,32,0.05);
      --shadow-sm:  0 2px 8px rgba(44,35,32,0.07);
      --shadow-md:  0 4px 16px rgba(44,35,32,0.10);
      --shadow-lg:  0 8px 32px rgba(44,35,32,0.12);
      --shadow-nav: 0 1px 0 #EDE3DC;
      --font-display: 'Cormorant Garamond', 'SimSun', serif;
      --font-body:    'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --duration-fast:   150ms;
      --duration-normal: 250ms;
      --duration-slow:   400ms;
      --ease-out:        cubic-bezier(0.4, 0, 0.2, 1);
      --ease-in-out:     cubic-bezier(0.4, 0, 0.6, 1);
      --ease-spring:     cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { font-family: var(--font-body); }

    body {
      background-color: var(--color-bg-warm);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 页面进场 */
    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .login-wrap {
      animation: pageEnter var(--duration-slow) var(--ease-out) both;
    }

    /* 品牌名 */
    .brand-name {
      font-family: var(--font-display);
      font-size: 38px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--color-text-primary);
      line-height: 1.2;
    }

    /* 装饰线 */
    .brand-divider {
      width: 48px;
      height: 1px;
      background: var(--color-accent);
      margin: 12px auto;
    }

    /* 卡片 */
    .login-card {
      background: #fff;
      border: 1px solid var(--color-border-light);
      border-radius: 6px;
      box-shadow: var(--shadow-md);
      padding: 36px 32px;
    }

    /* 表单标签 */
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-secondary);
      margin-bottom: 6px;
    }

    /* 输入框 */
    .input-field {
      width: 100%;
      height: 44px;
      background: #fff;
      border: 1.5px solid var(--color-border-light);
      border-radius: 4px;
      padding: 0 14px;
      font-size: 15px;
      font-family: var(--font-body);
      color: var(--color-text-primary);
      box-shadow: var(--shadow-xs);
      transition: border-color var(--duration-normal) var(--ease-out),
                  box-shadow var(--duration-normal) var(--ease-out);
      outline: none;
      box-sizing: border-box;
    }
    .input-field::placeholder { color: var(--color-text-muted); }
    .input-field:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(196,132,90,0.12);
    }

    /* 错误提示 */
    .error-box {
      background: var(--color-danger-bg);
      border: 1px solid rgba(184,106,106,0.25);
      color: var(--color-danger);
      font-size: 13px;
      border-radius: 4px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    /* 主按钮 */
    .btn-primary {
      width: 100%;
      height: 44px;
      background: var(--color-primary);
      color: var(--color-text-on-primary);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.06em;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(196,132,90,0.30);
      transition: all var(--duration-normal) var(--ease-out);
    }
    .btn-primary:hover {
      background: var(--color-primary-light);
      box-shadow: 0 4px 12px rgba(196,132,90,0.40);
      transform: translateY(-1px);
    }
    .btn-primary:active {
      background: var(--color-primary-dark);
      transform: translateY(0) scale(0.98);
    }
    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>

  <div class="login-wrap w-full px-4" style="max-width: 400px;">
    <!-- 品牌标题 -->
    <div class="text-center mb-10">
      <div class="brand-name">美妆管理系统</div>
      <div class="brand-divider"></div>
      <div style="font-size: 12px; color: var(--color-text-muted); letter-spacing: 0.08em;">内部专用 · 请登录后使用</div>
    </div>

    <!-- 登录卡片 -->
    <div class="login-card">
      <h2 style="font-size: 17px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 24px;">账号登录</h2>

      <!-- 错误提示 -->
      <div id="error-msg" class="error-box" style="display:none;"></div>

      <form id="login-form" novalidate>
        <!-- 用户名 -->
        <div style="margin-bottom: 16px;">
          <label class="form-label" for="username">用户名</label>
          <input
            id="username"
            type="text"
            autocomplete="username"
            placeholder="请输入用户名"
            class="input-field"
          />
        </div>

        <!-- 密码 -->
        <div style="margin-bottom: 28px;">
          <label class="form-label" for="password">密码</label>
          <input
            id="password"
            type="password"
            autocomplete="current-password"
            placeholder="请输入密码"
            class="input-field"
          />
        </div>

        <!-- 登录按钮 -->
        <button type="submit" id="submit-btn" class="btn-primary">登录</button>
      </form>
    </div>

    <p style="text-align: center; font-size: 11px; color: var(--color-text-muted); margin-top: 24px;">
      © 2026 美妆内部销售系统
    </p>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 hidden"></div>

  <script src="js/api.js"></script>
  <script>
    // 已登录则跳转首页
    if (localStorage.getItem('admin_token')) {
      window.location.href = 'index.html';
    }

    const form    = document.getElementById('login-form');
    const errMsg  = document.getElementById('error-msg');
    const btn     = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        showError('请输入用户名和密码');
        return;
      }

      btn.disabled = true;
      btn.textContent = '登录中...';
      errMsg.style.display = 'none';

      try {
        const data = await api.post('/auth/login', { username, password });
        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('admin_user', data.username);
        window.location.href = 'index.html';
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.textContent = '登录';
      }
    });

    function showError(msg) {
      errMsg.textContent = msg;
      errMsg.style.display = 'block';
    }

    // Enter 键提交
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
    });
  </script>
</body>
</html>
