<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>订单管理 - 美妆管理系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/custom.css" />
  <style>
    :root {
      --color-primary:        #C4845A;
      --color-primary-light:  #D9A882;
      --color-primary-dark:   #A8694A;
      --color-primary-muted:  #F0D5C5;
      --color-accent:         #E8C9A8;
      --color-gold:           #BFA080;
      --color-bg-base:        #FDFAF8;
      --color-bg-warm:        #F5EDE8;
      --color-bg-section:     #FAF6F3;
      --color-bg-overlay:     rgba(196,132,90,0.06);
      --color-text-primary:   #2C2320;
      --color-text-secondary: #6B5E58;
      --color-text-muted:     #A89690;
      --color-text-on-primary:#FDFAF8;
      --color-text-link:      #C4845A;
      --color-border-light:   #EDE3DC;
      --color-border-medium:  #D9CBBE;
      --color-border-focus:   #C4845A;
      --color-success:        #7BAF8A;
      --color-success-bg:     #EEF5F0;
      --color-warning:        #C9935A;
      --color-warning-bg:     #FBF2EA;
      --color-danger:         #B86A6A;
      --color-danger-bg:      #F7EDED;
      --color-info:           #7A9BB5;
      --color-info-bg:        #EEF3F8;
      --shadow-xs:  0 1px 2px rgba(44,35,32,0.05);
      --shadow-sm:  0 2px 8px rgba(44,35,32,0.07);
      --shadow-md:  0 4px 16px rgba(44,35,32,0.10);
      --shadow-lg:  0 8px 32px rgba(44,35,32,0.12);
      --shadow-nav: 0 1px 0 #EDE3DC;
      --font-display: 'Cormorant Garamond', 'SimSun', serif;
      --font-body:    'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      --duration-fast:   150ms;
      --duration-normal: 250ms;
      --duration-slow:   400ms;
      --ease-out:        cubic-bezier(0.4, 0, 0.2, 1);
      --ease-in-out:     cubic-bezier(0.4, 0, 0.6, 1);
      --ease-spring:     cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * { font-family: var(--font-body); }

    body {
      background-color: var(--color-bg-base);
      color: var(--color-text-primary);
    }

    /* ── 侧边栏 ── */
    .sidebar {
      width: 220px;
      background: #2C2320;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-logo {
      height: 64px;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-bottom: 1px solid rgba(253,250,248,0.08);
    }
    .sidebar-logo-sub {
      font-size: 10px;
      color: rgba(253,250,248,0.45);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .sidebar-logo-name {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 400;
      color: var(--color-gold);
      letter-spacing: 0.08em;
      margin-top: 2px;
    }
    .sidebar-nav {
      flex: 1;
      padding: 12px 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 400;
      color: rgba(253,250,248,0.75);
      text-decoration: none;
      margin-bottom: 2px;
      transition: background var(--duration-fast) var(--ease-out),
                  color var(--duration-fast) var(--ease-out);
      border-left: 3px solid transparent;
    }
    .nav-item:hover {
      background: rgba(253,250,248,0.06);
      color: #FDFAF8;
    }
    .nav-item.active {
      background: rgba(196,132,90,0.18);
      color: var(--color-primary-muted);
      border-left-color: var(--color-primary);
      font-weight: 500;
    }
    .sidebar-footer {
      padding: 16px 16px;
      border-top: 1px solid rgba(253,250,248,0.08);
    }
    .sidebar-user-name {
      font-size: 11px;
      color: rgba(253,250,248,0.45);
      margin-bottom: 6px;
    }
    .logout-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: rgba(253,250,248,0.55);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color var(--duration-fast) var(--ease-out);
    }
    .logout-btn:hover { color: #FDFAF8; }

    /* ── Topbar / Header ── */
    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--color-border-light);
      box-shadow: var(--shadow-nav);
      padding: 0 24px;
      flex-shrink: 0;
    }
    .topbar-title-row {
      height: 56px;
      display: flex;
      align-items: center;
    }
    .topbar-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary);
    }

    /* ── 状态 Tab ── */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 0 12px;
      flex-wrap: wrap;
    }
    .status-tab {
      padding: 5px 14px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
      color: var(--color-text-secondary);
      background: transparent;
    }
    .status-tab:hover {
      background: var(--color-bg-warm);
      color: var(--color-text-primary);
    }
    .status-tab.active-tab {
      background: var(--color-primary);
      color: var(--color-text-on-primary);
    }

    /* ── 日期输入 ── */
    .date-input {
      height: 32px;
      background: #fff;
      border: 1.5px solid var(--color-border-light);
      border-radius: 4px;
      padding: 0 10px;
      font-size: 12px;
      font-family: var(--font-body);
      color: var(--color-text-secondary);
      outline: none;
      transition: border-color var(--duration-normal) var(--ease-out),
                  box-shadow var(--duration-normal) var(--ease-out);
    }
    .date-input:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(196,132,90,0.12);
    }
    .clear-btn {
      font-size: 12px;
      color: var(--color-text-muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
      transition: color var(--duration-fast) var(--ease-out);
    }
    .clear-btn:hover { color: var(--color-text-primary); }

    /* ── 表格 ── */
    .table-wrap {
      background: #fff;
      border: 1px solid var(--color-border-light);
      border-radius: 6px;
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; min-width: 640px; }
    thead tr {
      background: var(--color-bg-section);
      border-bottom: 1.5px solid var(--color-border-light);
    }
    th {
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-secondary);
      text-align: left;
    }
    tbody tr {
      border-bottom: 1px solid #F2EAE5;
      transition: background var(--duration-fast) var(--ease-out);
      cursor: pointer;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--color-bg-section); }
    td {
      padding: 14px 16px;
      font-size: 13px;
      color: var(--color-text-primary);
    }

    /* ── 订单状态徽章 4.3 规范 ── */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 3px;
    }
    .badge-pending {
      background: var(--color-warning-bg);
      color: var(--color-warning);
      border: 1px solid rgba(201,147,90,0.25);
    }
    .badge-confirm {
      background: var(--color-info-bg);
      color: var(--color-info);
      border: 1px solid rgba(122,155,181,0.25);
    }
    .badge-done {
      background: var(--color-success-bg);
      color: var(--color-success);
      border: 1px solid rgba(123,175,138,0.25);
    }
    .badge-cancel {
      background: var(--color-danger-bg);
      color: var(--color-danger);
      border: 1px solid rgba(184,106,106,0.25);
    }

    /* ── 操作链接 ── */
    .action-link {
      font-size: 12px;
      color: var(--color-text-muted);
      text-decoration: none;
      transition: color var(--duration-fast) var(--ease-out);
    }
    .action-link:hover { color: var(--color-primary); }
  </style>
</head>
<body>
<div class="flex h-screen">

  <!-- ── 侧边栏 ── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-sub">Admin</div>
      <div class="sidebar-logo-name">美妆销售系统</div>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        首页
      </a>
      <a href="products.html" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        商品管理
      </a>
      <a href="brands.html" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
        品牌管理
      </a>
      <a href="tags.html" class="nav-item">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/></svg>
        标签管理
      </a>
      <a href="orders.html" class="nav-item active">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        订单管理
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-name" id="sidebar-user"></div>
      <button onclick="authLogout()" class="logout-btn">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        退出登录
      </button>
    </div>
  </aside>

  <!-- ── 主内容 ── -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- 顶栏 -->
    <header class="topbar">
      <div class="topbar-title-row">
        <h1 class="topbar-title">订单管理</h1>
      </div>
      <!-- 状态 Tab + 日期筛选 -->
      <div class="tab-bar" id="status-tabs">
        <button onclick="setStatus('')"      data-status=""    class="status-tab active-tab">全部</button>
        <button onclick="setStatus('待处理')" data-status="待处理" class="status-tab">待处理</button>
        <button onclick="setStatus('已确认')" data-status="已确认" class="status-tab">已确认</button>
        <button onclick="setStatus('已完成')" data-status="已完成" class="status-tab">已完成</button>
        <button onclick="setStatus('已取消')" data-status="已取消" class="status-tab">已取消</button>
        <div style="flex:1;"></div>
        <!-- 日期筛选 -->
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="date" id="date-from" onchange="loadOrders()" class="date-input" />
          <span style="color:var(--color-text-muted);font-size:12px;">—</span>
          <input type="date" id="date-to" onchange="loadOrders()" class="date-input" />
          <button onclick="clearDates()" class="clear-btn">清除</button>
        </div>
      </div>
    </header>

    <!-- 主体 -->
    <main class="flex-1 overflow-auto" style="padding: 24px; background: var(--color-bg-base);">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>订单编号</th>
              <th>客户姓名</th>
              <th>联系方式</th>
              <th>订单金额</th>
              <th>状态</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="order-table-body">
            <tr><td colspan="7" style="padding: 64px 0; text-align: center; color: var(--color-text-muted);">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 right-6 z-50 hidden"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  requireAuth();
  document.getElementById('sidebar-user').textContent = getAdminUser();

  let currentStatus = '';

  const STATUS_BADGE = {
    '待处理': 'badge badge-pending',
    '已确认': 'badge badge-confirm',
    '已完成': 'badge badge-done',
    '已取消': 'badge badge-cancel',
  };

  function setStatus(s) {
    currentStatus = s;
    document.querySelectorAll('.status-tab').forEach(btn => {
      const isActive = btn.dataset.status === s;
      btn.className = 'status-tab' + (isActive ? ' active-tab' : '');
    });
    loadOrders();
  }

  function clearDates() {
    document.getElementById('date-from').value = '';
    document.getElementById('date-to').value = '';
    loadOrders();
  }

  function formatDate(isoStr) {
    if (!isoStr) return '—';
    const d = new Date(isoStr);
    return d.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }) +
      ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  }

  async function loadOrders() {
    const tbody    = document.getElementById('order-table-body');
    const dateFrom = document.getElementById('date-from').value;
    const dateTo   = document.getElementById('date-to').value;

    tbody.innerHTML = `<tr><td colspan="7" style="padding: 64px 0; text-align: center; color: var(--color-text-muted);">加载中...</td></tr>`;

    try {
      const orders = await api.get('/orders', {
        order_status: currentStatus || null,
        date_from: dateFrom || null,
        date_to: dateTo || null,
      });

      if (!orders.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="padding: 64px 0; text-align: center; color: var(--color-text-muted);">暂无订单</td></tr>`;
        return;
      }

      tbody.innerHTML = orders.map(o => {
        const badgeCls = STATUS_BADGE[o.status] || 'badge badge-pending';
        return `<tr onclick="window.location.href='orders-detail.html?id=${o.id}'">
          <td style="font-family:monospace;font-size:12px;color:var(--color-text-muted);">#${String(o.id).padStart(6, '0')}</td>
          <td style="font-weight:500;">${o.customer_name}</td>
          <td style="color:var(--color-text-secondary);">${o.phone}</td>
          <td style="font-family:var(--font-display);font-size:16px;color:var(--color-primary);font-weight:400;">¥${Number(o.total_amount).toFixed(2)}</td>
          <td><span class="${badgeCls}">${o.status}</span></td>
          <td style="color:var(--color-text-muted);font-size:12px;">${formatDate(o.created_at)}</td>
          <td>
            <a href="orders-detail.html?id=${o.id}" onclick="event.stopPropagation()" class="action-link">查看详情</a>
          </td>
        </tr>`;
      }).join('');
    } catch (err) {
      showToast(err.message, 'error');
      tbody.innerHTML = `<tr><td colspan="7" style="padding: 64px 0; text-align: center; color: var(--color-danger);">加载失败</td></tr>`;
    }
  }

  loadOrders();
</script>
</body>
</html>
